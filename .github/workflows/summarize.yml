name: Podcast Summary

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      feed:
        description: 'Filter by feed name (substring, e.g. "בזמן שעבדתם")'
        required: false
        default: ''
      test:
        description: 'Test mode — process 1 episode per feed type'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: summarize
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=()
          [ "${{ github.event.inputs.test }}" = "true" ] && args+=(--test)
          [ -n "${{ github.event.inputs.feed }}" ] && args+=(--feed "${{ github.event.inputs.feed }}")
          python main.py "${args[@]}"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master
          git add data/seen.json
          git add -f results.txt.md || true
          git add data/transcripts/ || true
          git diff --cached --quiet || git commit -m "chore: update summaries [skip ci]"
          git push origin master
