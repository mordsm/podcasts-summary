name: Podcast Summary

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      feed:
        description: 'Filter by feed name (substring, e.g. "בזמן שעבדתם")'
        required: false
        default: ''
      test:
        description: 'Test mode — process 1 episode per feed type'
        required: false
        type: boolean
        default: false
      resend_history:
        description: 'Resend all existing results.txt.md entries to Telegram'
        required: false
        type: boolean
        default: false
      no_pdf:
        description: 'Skip PDF show-notes extraction (for before/after comparison)'
        required: false
        type: boolean
        default: false
      write_results:
        description: 'Also append summaries to results.txt.md'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  models: read

concurrency:
  group: summarize
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - uses: actions/cache@v5
        id: venv-cache
        with:
          path: ~/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-v1

      - name: Install dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv ~/.venv
          ~/.venv/bin/pip install -r requirements.txt

      - name: Add venv to PATH
        run: echo "$HOME/.venv/bin" >> $GITHUB_PATH

      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_TEST: ${{ github.event.inputs.test }}
          INPUT_FEED: ${{ github.event.inputs.feed }}
          INPUT_RESEND_HISTORY: ${{ github.event.inputs.resend_history }}
          INPUT_NO_PDF: ${{ github.event.inputs.no_pdf }}
          INPUT_WRITE_RESULTS: ${{ github.event.inputs.write_results }}
        run: |
          args=()
          [ "$INPUT_TEST" = "true" ] && args+=(--test)
          [ -n "$INPUT_FEED" ] && args+=(--feed "$INPUT_FEED")
          [ "$INPUT_RESEND_HISTORY" = "true" ] && args+=(--resend-history)
          [ "$INPUT_NO_PDF" = "true" ] && args+=(--no-pdf)
          [ "$INPUT_WRITE_RESULTS" = "true" ] && args+=(--write-results)
          python main.py "${args[@]}"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen.json
          git add results.txt.md || true
          git add data/transcripts/ || true
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: update summaries [skip ci]"
            git pull --rebase origin master
            git push origin master
          fi
